name: Gourmet-Go CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: fdebbich/order-service:latest

      - name: Push kitchen-service
        uses: docker/build-push-action@v5
        with:
          context: ./kitchen-service
          push: true
          tags: fdebbich/kitchen-service:latest

      - name: Push accounting-service
        uses: docker/build-push-action@v5
        with:
          context: ./accounting-service
          push: true
          tags: fdebbich/accounting-service:latest

      - name: Push order-orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./order-orchestrator
          push: true
          tags: fdebbich/order-orchestrator:latest

      - name: Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: fdebbich/api-gateway:latest
